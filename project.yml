name: Verba
options:
  bundleIdPrefix: com.rosswoodhurst
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  Verba:
    type: application
    platform: macOS
    sources:
      - path: Verba
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rosswoodhurst.verba
        PRODUCT_NAME: Verba
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Verba/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Verba/Support/Verba.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
  VerbaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VerbaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rosswoodhurst.verba.tests
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Verba
schemes:
  Verba:
    build:
      targets:
        Verba: all
        VerbaTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VerbaTests
